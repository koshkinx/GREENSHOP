<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shop</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
     <!-- ========== -->
      <!-- HEADER -->
       <!-- ========== -->
    <header class="header">
      <div class="container header__inner">
        <div class="logo">
          <img class="logo--img" src="./icons/Logo-GREENSHOP.svg" alt="logo" />
        </div>

        <nav class="nav">
          <ul>
            <li><a href="#" class="nav-link">Home</a></li>
            <li><a href="#" class="nav-link">Shop</a></li>
            <li><a href="#" class="nav-link">Plant Care</a></li>
            <li><a href="#" class="nav-link">Blogs</a></li>
          </ul>
        </nav>

        <div class="login">
          <a href="#" class="login-btn">
            <img src="./icons/Logout.svg" alt="logout" />
            Login
          </a>
        </div>
      </div>
    </header>
    <main>
      <!-- ========== -->
      <!-- HERO -->
       <!-- ========== -->
      <section class="hero">
        <div class="container hero-inner">
          <div class="hero-text">
            <p class="subtitle">welcome to greenshop</p>

            <h1>
              let's make a <br />
              better <span>planet</span>
            </h1>

            <p class="description">
              We are an online plant shop offering a wide range of cheap and
              trendy plants. Use <br /> our plants to create an unique Urban Jungle.
              Order your favorite plants!
            </p>

            <button class="shop-btn">shop now</button>
          </div>

          <div class="hero-image">
            <img src="./img/img-banner.png" alt="plant" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
